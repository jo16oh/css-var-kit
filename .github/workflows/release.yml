name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-pkg: cli-darwin-arm64
            binary: cvk
          - target: x86_64-apple-darwin
            os: macos-latest
            npm-pkg: cli-darwin-x64
            binary: cvk
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: cli-linux-x64
            binary: cvk
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: cli-linux-arm64
            binary: cvk
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-pkg: cli-win32-x64
            binary: cvk.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p css-var-kit

      - name: Copy binary to npm package
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} packages/${{ matrix.npm-pkg }}/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: packages/${{ matrix.npm-pkg }}/${{ matrix.binary }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place binaries into npm packages
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-linux-arm64 cli-win32-x64; do
            cp artifacts/$pkg/* packages/$pkg/
            chmod +x packages/$pkg/cvk* 2>/dev/null || true
          done

      - name: Publish platform packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-linux-arm64 cli-win32-x64; do
            npm publish packages/$pkg --access public
          done

      - name: Publish main package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish packages/css-var-kit --access public

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p css-var-kit

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release archives
        run: |
          mkdir -p dist
          for dir in artifacts/cli-*; do
            pkg=$(basename "$dir")
            tar -czf "dist/css-var-kit-${pkg#cli-}.tar.gz" -C "$dir" .
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
