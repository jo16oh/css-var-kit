name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-pkg: cli-darwin-arm64
            binary: cvk
          - target: x86_64-apple-darwin
            os: macos-latest
            npm-pkg: cli-darwin-x64
            binary: cvk
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: cli-linux-x64
            binary: cvk
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: cli-linux-arm64
            binary: cvk
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-pkg: cli-win32-x64
            binary: cvk.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p css-var-kit

      - name: Copy binary to npm package
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} packages/${{ matrix.npm-pkg }}/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: packages/${{ matrix.npm-pkg }}/${{ matrix.binary }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place binaries into npm packages
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-linux-arm64 cli-win32-x64; do
            cp artifacts/$pkg/* packages/$pkg/
            chmod +x packages/$pkg/cvk* 2>/dev/null || true
          done

      - name: Publish platform packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-linux-arm64 cli-win32-x64; do
            name=$(node -p "require('./packages/$pkg/package.json').name")
            version=$(node -p "require('./packages/$pkg/package.json').version")
            if npm view "$name@$version" version &>/dev/null 2>&1; then
              echo "Skipping $name@$version (already published)"
            else
              npm publish "./packages/$pkg" --access public
            fi
          done

      - name: Publish main package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          name=$(node -p "require('./packages/css-var-kit/package.json').name")
          version=$(node -p "require('./packages/css-var-kit/package.json').version")
          if npm view "$name@$version" version &>/dev/null 2>&1; then
            echo "Skipping $name@$version (already published)"
          else
            npm publish ./packages/css-var-kit --access public
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          version=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="css-var-kit") | .version')
          if curl -sf "https://crates.io/api/v1/crates/css-var-kit/$version" \
            -H "User-Agent: css-var-kit-releaser" | jq -e '.version.num' &>/dev/null 2>&1; then
            echo "Skipping css-var-kit@$version (already published)"
          else
            cargo publish -p css-var-kit
          fi

  publish-vscode:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - npm-pkg: cli-darwin-arm64
            vsce-target: darwin-arm64
            binary: cvk
          - npm-pkg: cli-darwin-x64
            vsce-target: darwin-x64
            binary: cvk
          - npm-pkg: cli-linux-arm64
            vsce-target: linux-arm64
            binary: cvk
          - npm-pkg: cli-linux-x64
            vsce-target: linux-x64
            binary: cvk
          - npm-pkg: cli-win32-x64
            vsce-target: win32-x64
            binary: cvk.exe
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy LICENSE
        run: cp LICENSE packages/vscode/LICENSE

      - name: Build extension
        working-directory: packages/vscode
        run: pnpm run build

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.npm-pkg }}
          path: packages/vscode/bin

      - name: Make binary executable
        run: chmod +x packages/vscode/bin/${{ matrix.binary }}

      - name: Package VSIX
        working-directory: packages/vscode
        run: npx @vscode/vsce package --no-dependencies --target ${{ matrix.vsce-target }}

      - name: Publish to Marketplace
        working-directory: packages/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --no-dependencies --packagePath *.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce-target }}
          path: packages/vscode/*.vsix

  github-release:
    needs: [build, publish-vscode]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release archives
        run: |
          mkdir -p dist
          for dir in artifacts/cli-*; do
            pkg=$(basename "$dir")
            tar -czf "dist/css-var-kit-${pkg#cli-}.tar.gz" -C "$dir" .
          done
          cp artifacts/vsix-*/*.vsix dist/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
